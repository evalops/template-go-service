name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: evalops/service-runtime/.github/actions/setup-go-service@95e1fb6f9850bae67ec32d0ffadd4a439fb320a4
      - run: go test ./... -count=1
      - run: go test ./... -race -count=1
      - run: go build ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: evalops/service-runtime/.github/actions/setup-go-service@95e1fb6f9850bae67ec32d0ffadd4a439fb320a4
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: evalops/service-runtime/.github/actions/setup-go-service@95e1fb6f9850bae67ec32d0ffadd4a439fb320a4
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3 run --timeout=5m ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: evalops/service-runtime/.github/actions/setup-go-service@95e1fb6f9850bae67ec32d0ffadd4a439fb320a4
      - run: go run github.com/securego/gosec/v2/cmd/gosec@v2.22.4 ./...
