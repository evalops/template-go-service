name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: evalops/service-runtime/.github/actions/setup-go-service@95e1fb6f9850bae67ec32d0ffadd4a439fb320a4
      - run: go test ./...
      - run: go build ./...
